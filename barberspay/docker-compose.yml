version: '3.9'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: barberspay
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/barberspay
      JWT_SECRET: dev_secret_change_me
      FRONTEND_URL: http://localhost:3000
      PAYSTACK_SECRET: ${PAYSTACK_SECRET:-sk_test_placeholder}
      FLUTTERWAVE_SECRET: ${FLUTTERWAVE_SECRET:-FLWSECK_TEST-placeholder}
      FLUTTERWAVE_WEBHOOK_HASH: ${FLUTTERWAVE_WEBHOOK_HASH:-placeholder}
    depends_on:
      - db
    command: sh -c "npm run migrate && npm start"

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      - backend

volumes:
  pgdata:
